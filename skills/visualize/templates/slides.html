<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>visualize — slide deck (diagram-per-slide)</title>
<!--
  DECK TEMPLATE for `visualize` slides mode.
  HARD RULES: each content slide is ONE diagram that fully describes that part of the
  architecture/flow. ≤3 short lines of text per slide — a 3–5 word title + maybe one caption +
  node labels. NO prose bullets, NO paragraphs. Gazable in ~2s. Open on the core fast (≤1 ramp slide).
  Pull the diagram from references/primitives.html. Nav (←/→/space/scroll/swipe + dots + bar) is wired.
-->
<style>
  :root{
    --bg:#0d1117;--panel:#141b24;--line:#2a313c;--ink:#e6edf3;--mut:#9aa7b4;--dim:#6b7785;
    --acc:#e06b3b;--acc2:#f0a868;--good:#3fb950;--bad:#e5534b;--blue:#4493f8;
    --mono:'SF Mono',ui-monospace,Menlo,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--ink);font:16px/1.5 -apple-system,BlinkMacSystemFont,'Segoe UI',Inter,sans-serif;-webkit-font-smoothing:antialiased}
  .deck{height:100vh;overflow-y:scroll;scroll-snap-type:y mandatory;scroll-behavior:smooth}
  .slide{min-height:100vh;scroll-snap-align:start;display:flex;flex-direction:column;justify-content:center;align-items:center;
    padding:6vh 7vw;position:relative;text-align:center;
    background:radial-gradient(900px 600px at 75% -10%,#1a2330 0%,var(--bg) 60%);
    opacity:0;transform:translateY(20px);transition:opacity .55s ease,transform .55s ease}
  .slide.visible{opacity:1;transform:none}
  .slide:nth-child(even){background:radial-gradient(900px 600px at 20% 110%,#191f2b 0%,var(--bg) 60%)}
  /* text budget: title + one caption, that's it */
  .label{font:600 13px/1 var(--mono);letter-spacing:.2em;text-transform:uppercase;color:var(--acc2);margin-bottom:18px}
  .title{font-size:clamp(26px,3.6vw,46px);line-height:1.1;margin:0 0 26px;letter-spacing:-.01em;font-weight:700;max-width:18ch}
  .title .hl{background:linear-gradient(110deg,var(--acc),var(--acc2));-webkit-background-clip:text;background-clip:text;color:transparent}
  .cap{margin-top:22px;color:var(--dim);font-size:clamp(13px,1.3vw,16px);max-width:46ch}
  .cap code{font-family:var(--mono);font-size:.9em;color:var(--acc2);background:#10151c;border:1px solid var(--line);padding:1px 5px;border-radius:5px}
  /* the diagram owns the slide */
  .figure{width:100%;max-width:920px;display:flex;justify-content:center}
  svg{max-width:100%;height:auto;overflow:visible}
  .t{fill:var(--ink);font-family:-apple-system,Inter,sans-serif}.tm{fill:var(--mut)}.td{fill:var(--dim)}.ta{fill:var(--acc2)}.tg{fill:var(--good)}
  .lbl{font:600 11px/1 var(--mono);letter-spacing:.08em;text-transform:uppercase}
  /* title slide only: allow a big headline */
  .hero .title{font-size:clamp(40px,7vw,92px);max-width:14ch}
  /* nav chrome */
  .deck-progress{position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,var(--acc),var(--acc2));z-index:50;transition:width .4s ease}
  .deck-dots{position:fixed;right:24px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:11px;z-index:50}
  .deck-dot{width:9px;height:9px;border-radius:50%;border:none;padding:0;cursor:pointer;background:#3a4351;transition:transform .2s,background .2s}
  .deck-dot.active{background:var(--acc);transform:scale(1.45)}
  .deck-counter{position:fixed;left:24px;bottom:20px;font:600 13px/1 var(--mono);color:var(--dim);z-index:50}
  .deck-hints{position:fixed;right:24px;bottom:20px;font:13px/1 var(--mono);color:var(--dim);z-index:50;transition:opacity .6s}
  .deck-hints.faded{opacity:0}
  @media(max-width:760px){.deck-dots{display:none}}
  @media(prefers-reduced-motion:reduce){.slide{transition:none;opacity:1;transform:none}.deck{scroll-behavior:auto}}
</style>
</head>
<body>
<div class="deck">

  <!-- 1 · TITLE — state the takeaway as a flat fact. one ramp slide max. NO punchy copy. -->
  <section class="slide hero">
    <div class="label">Subject</div>
    <h1 class="title">Reads: <span class="hl">90%</span> served from cache</h1>
  </section>

  <!-- 2 · ARCHITECTURE — one schematic that fully shows how it fits -->
  <section class="slide">
    <h2 class="title">How it fits together</h2>
    <div class="figure">
      <svg viewBox="0 0 720 250" width="720">
        <defs><marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#6b7785"/></marker></defs>
        <g transform="translate(30,95)"><rect width="150" height="64" rx="10" fill="#161f2b" stroke="var(--line)"/><text x="75" y="38" text-anchor="middle" class="t" font-size="15" font-weight="600">client</text></g>
        <g transform="translate(285,95)"><rect width="150" height="64" rx="10" fill="#10151c" stroke="var(--acc)" stroke-width="1.5"/><text x="75" y="32" text-anchor="middle" class="ta" font-size="15" font-weight="600">API</text><text x="75" y="50" text-anchor="middle" class="td" font-size="11">edge</text></g>
        <g transform="translate(540,95)"><rect width="150" height="64" rx="10" fill="#161f2b" stroke="var(--blue)"/><text x="75" y="38" text-anchor="middle" class="t" font-size="15" font-weight="600">store</text></g>
        <path d="M180,127 L285,127" fill="none" stroke="#6b7785" stroke-width="1.6" marker-end="url(#arrow)"/>
        <path d="M435,127 L540,127" fill="none" stroke="#6b7785" stroke-width="1.6" marker-end="url(#arrow)"/>
      </svg>
    </div>
    <p class="cap">swap in the real boxes — the diagram must show every core part, not a hint of it</p>
  </section>

  <!-- 3 · FLOW — animated, fully describes the path -->
  <section class="slide">
    <h2 class="title">The request flow</h2>
    <div class="figure">
      <svg viewBox="0 0 720 220" width="720">
        <rect x="20" y="86" width="120" height="58" rx="10" fill="#161f2b" stroke="var(--line)"/><text x="80" y="120" text-anchor="middle" class="t" font-size="14" font-weight="600">in</text>
        <rect x="300" y="80" width="150" height="70" rx="12" fill="#10151c" stroke="var(--acc)" stroke-width="1.5"/><text x="375" y="110" text-anchor="middle" class="ta" font-size="14" font-weight="600">process</text><text x="375" y="130" text-anchor="middle" class="td" font-size="11">decision point</text>
        <rect x="580" y="86" width="120" height="58" rx="10" fill="#161f2b" stroke="var(--good)"/><text x="640" y="120" text-anchor="middle" class="tg" font-size="14" font-weight="600">out</text>
        <path id="s1" d="M140,115 L300,115" fill="none" stroke="#2a313c" stroke-width="2"/>
        <path id="s2" d="M450,115 L580,115" fill="none" stroke="#2a313c" stroke-width="2"/>
        <circle r="6" fill="var(--acc2)"><animateMotion dur="1.6s" repeatCount="indefinite" begin="0s"><mpath href="#s1"/></animateMotion></circle>
        <circle r="6" fill="var(--acc2)"><animateMotion dur="1.6s" repeatCount="indefinite" begin="1.6s"><mpath href="#s2"/></animateMotion></circle>
      </svg>
    </div>
  </section>

  <!-- 4 · DECISION — flat fact + the actual reason. NO "chose X over Y" drama. -->
  <section class="slide">
    <div class="label">Decision</div>
    <h2 class="title">Fetch on demand, no prefetch job</h2>
    <p class="cap">nothing pre-warms the cache · caller opts in with <code>refresh: true</code></p>
  </section>

</div>

<script>
(function(){
  function Deck(){
    this.deck=document.querySelector('.deck');this.slides=[].slice.call(document.querySelectorAll('.slide'));
    this.total=this.slides.length;this.current=0;this._chrome();this._bind();this._observe();this._update();
  }
  Deck.prototype._chrome=function(){
    var self=this,b=document.createElement('div');b.className='deck-progress';document.body.appendChild(b);this.bar=b;
    var d=document.createElement('div');d.className='deck-dots';
    this.slides.forEach(function(_,i){var x=document.createElement('button');x.className='deck-dot';x.title='Slide '+(i+1);x.onclick=function(){self.go(i);};d.appendChild(x);});
    document.body.appendChild(d);this.dots=[].slice.call(d.children);
    var c=document.createElement('div');c.className='deck-counter';document.body.appendChild(c);this.counter=c;
    var h=document.createElement('div');h.className='deck-hints';h.textContent='← → / scroll';document.body.appendChild(h);this.hints=h;
    this.ht=setTimeout(function(){h.classList.add('faded');},4000);
  };
  Deck.prototype._bind=function(){
    var self=this;
    document.addEventListener('keydown',function(e){
      if(e.target.closest('input,textarea,[contenteditable]'))return;
      if(['ArrowDown','ArrowRight',' ','PageDown'].indexOf(e.key)>-1){e.preventDefault();self.next();}
      else if(['ArrowUp','ArrowLeft','PageUp'].indexOf(e.key)>-1){e.preventDefault();self.prev();}
      else if(e.key==='Home'){e.preventDefault();self.go(0);}
      else if(e.key==='End'){e.preventDefault();self.go(self.total-1);}
      self._fade();
    });
    var ty;this.deck.addEventListener('touchstart',function(e){ty=e.touches[0].clientY;},{passive:true});
    this.deck.addEventListener('touchend',function(e){var dy=ty-e.changedTouches[0].clientY;if(Math.abs(dy)>50){dy>0?self.next():self.prev();}});
  };
  Deck.prototype._observe=function(){
    var self=this,o=new IntersectionObserver(function(es){es.forEach(function(en){if(en.isIntersecting){en.target.classList.add('visible');self.current=self.slides.indexOf(en.target);self._update();}});},{threshold:0.5});
    this.slides.forEach(function(s){o.observe(s);});
  };
  Deck.prototype.go=function(i){this.slides[Math.max(0,Math.min(i,this.total-1))].scrollIntoView({behavior:'smooth'});};
  Deck.prototype.next=function(){if(this.current<this.total-1)this.go(this.current+1);};
  Deck.prototype.prev=function(){if(this.current>0)this.go(this.current-1);};
  Deck.prototype._update=function(){
    this.bar.style.width=((this.current+1)/this.total*100)+'%';
    var c=this.current;this.dots.forEach(function(d,i){d.classList.toggle('active',i===c);});
    this.counter.textContent=(this.current+1)+' / '+this.total;
  };
  Deck.prototype._fade=function(){clearTimeout(this.ht);this.hints.classList.add('faded');};
  new Deck();
})();
</script>
</body>
</html>
